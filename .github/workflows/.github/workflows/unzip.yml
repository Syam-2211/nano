name: Unzip Archive

on:
  push:
    paths:
      - "NANO BOTZ NEWWW.zip"   # Trigger only when the ZIP file changes

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Remove old extracted files
        run: rm -rf extracted

      - name: Unzip file (overwrite existing)
        run: unzip -o myfile.zip -d extracted

      - name: Commit extracted files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add -A
          git commit -m "Refreshed extracted files from archive"
          git push
